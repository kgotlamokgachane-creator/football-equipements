<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHECKOUT | KM GEARS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/scrollreveal"></script>
    <style>
        :root { --primary-red: #ff0000; --bg-black: #000000; --card-bg: #0a0a0a; --border-gray: #1a1a1a; --input-bg: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-black); color: white; line-height: 1.6; padding-top: 100px; }

        nav {
            display: flex; justify-content: space-between; align-items: center; padding: 25px 6%;
            position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-gray);
        }
        .logo { font-family: 'Orbitron'; font-size: 1.4rem; letter-spacing: 4px; font-weight: 900; text-transform: uppercase; text-decoration: none; color: white; }
        .logo span { color: var(--primary-red); }

        .checkout-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; }
        
        .checkout-form-section { background: var(--card-bg); border: 1px solid var(--border-gray); padding: 40px; }
        h2 { font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 8px; font-weight: 700; }
        input { 
            width: 100%; background: var(--input-bg); border: 1px solid var(--border-gray); 
            padding: 15px; color: white; font-size: 0.9rem; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary-red); }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .order-summary { background: #050505; border: 1px solid var(--border-gray); padding: 40px; height: fit-content; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.85rem; border-bottom: 1px solid #111; padding-bottom: 10px; }
        .total { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--primary-red); border-bottom: none; margin-top: 20px; }

        .btn-pay { 
            width: 100%; padding: 20px; background: var(--primary-red); color: white; border: none;
            font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        .btn-pay:hover { background: white; color: black; }

        /* Success Overlay */
        #success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black;
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center;
        }
        #success-overlay h1 { font-family: 'Orbitron'; font-size: 3rem; color: var(--primary-red); margin-bottom: 20px; }
        #success-overlay p { letter-spacing: 4px; color: #666; text-transform: uppercase; margin-bottom: 30px; }

        @media (max-width: 800px) { .checkout-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">KM<span>GEARS</span></a>
</nav>

<div class="checkout-container reveal">
    <div class="checkout-form-section">
        <h2>Shipping Details</h2>
        <form id="payment-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label>Shipping Address (Botswana)</label>
                <input type="text" placeholder="Plot / Street / Ward" required>
            </div>
            
            <h2 style="margin-top: 40px;">Payment</h2>
            <div class="form-group">
                <label>Card Number</label>
                <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" required>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="text" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="form-group">
                    <label>CVV</label>
                    <input type="password" placeholder="***" maxlength="3" required>
                </div>
            </div>
            <button type="submit" class="btn-pay">CONFIRM PURCHASE</button>
        </form>
    </div>

    <div class="order-summary">
        <h2>Your Order</h2>
        <div class="summary-item">
            <span>KM ELITE V1 (Red)</span>
            <span>P550.00</span>
        </div>
        <div class="summary-item">
            <span>Shipping</span>
            <span>FREE</span>
        </div>
        <div class="summary-item total">
            <span>TOTAL</span>
            <span>P550.00</span>
        </div>
    </div>
</div>

<div id="success-overlay">
    <span style="font-size: 4rem; margin-bottom: 20px;">🛡️</span>
    <h1>PURCHASE SUCCESSFUL</h1>
    <p>Your gear is being prepared for the pitch.</p>
    <a href="index.html" class="btn-pay" style="width: auto; text-decoration: none; display: inline-block;">RETURN TO HOME</a>
</div>

<script>
    ScrollReveal().reveal('.reveal', { delay: 200, distance: '30px', origin: 'bottom', duration: 800 });

    document.getElementById('payment-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Simulate a loading state
        const btn = document.querySelector('.btn-pay');
        btn.innerText = "PROCESSING...";
        btn.style.opacity = "0.5";
        btn.disabled = true;

        setTimeout(() => {
            document.getElementById('success-overlay').style.display = 'flex';
            window.scrollTo(0, 0);
        }, 2000);
    });
</script>

</body>
</html>
